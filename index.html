<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daniel Álamo Casanueva — CV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body id="cv-root">

  <!-- ░░ SIDEBAR ░░ -->
  <aside class="sidebar">

    <div class="avatar-wrap">
      <div class="avatar">
        <img src="photo.png" alt="Daniel Álamo Casanueva" />
      </div>
      <div class="avatar-ring"></div>
    </div>

    <h1 class="name" id="sb-name"></h1>
    <p class="tagline" id="sb-tagline"></p>

    <div class="divider"></div>

    <!-- Contact -->
    <section class="sb-section">
      <h3 class="sb-title" id="sb-contact-title"></h3>
      <ul class="contact-list" id="sb-contact"></ul>
    </section>

    <div class="divider"></div>

    <!-- Skills -->
    <section class="sb-section">
      <h3 class="sb-title" id="sb-skills-title"></h3>
      <div class="skill-bars" id="sb-skills"></div>
    </section>

    <div class="divider"></div>

    <!-- Languages -->
    <section class="sb-section">
      <h3 class="sb-title" id="sb-languages-title"></h3>
      <div class="lang-list" id="sb-languages"></div>
    </section>

    <div class="divider"></div>

    <!-- Tech Stack pills -->
    <section class="sb-section">
      <h3 class="sb-title" id="sb-tech-title"></h3>
      <div class="pill-cloud" id="sb-technologies"></div>
    </section>

  </aside>

  <!-- ░░ MAIN ░░ -->
  <main class="main">

    <!-- Header strip -->
    <header class="main-header">
      <div class="header-text">
        <p class="header-label" id="header-label"></p>
        <h2 class="header-title" id="header-title"></h2>
        <p class="header-sub" id="header-sub"></p>
        <div class="header-contact" id="header-contact"></div>
      </div>
      <div class="header-actions">
        <!-- Language selector -->
        <div class="lang-switcher" id="lang-switcher">
          <!-- Great Britain flag SVG -->
          <button class="lang-btn active" data-lang="en" title="English">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30">
              <clipPath id="a"><path d="M0 0v30h60V0z"/></clipPath>
              <clipPath id="b"><path d="M30 15h30v15zv15H0zH0V0zV0h30z"/></clipPath>
              <g clip-path="url(#a)">
                <path d="M0 0v30h60V0z" fill="#012169"/>
                <path d="M0 0l60 30m0-30L0 30" stroke="#fff" stroke-width="6"/>
                <path d="M0 0l60 30m0-30L0 30" clip-path="url(#b)" stroke="#C8102E" stroke-width="4"/>
                <path d="M30 0v30M0 15h60" stroke="#fff" stroke-width="10"/>
                <path d="M30 0v30M0 15h60" stroke="#C8102E" stroke-width="6"/>
              </g>
            </svg>
          </button>
          <!-- Spain flag SVG -->
          <button class="lang-btn" data-lang="es" title="Español">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30">
              <rect width="60" height="30" fill="#c60b1e"/>
              <rect y="7.5" width="60" height="15" fill="#ffc400"/>
            </svg>
          </button>
        </div>
        <button id="btn-download" class="btn-download">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H4a1 1 0 0 1-1-1zm3.293-7.707a1 1 0 0 1 1.414 0L9 10.586V3a1 1 0 1 1 2 0v7.586l1.293-1.293a1 1 0 1 1 1.414 1.414l-3 3a1 1 0 0 1-1.414 0l-3-3a1 1 0 0 1 0-1.414z" clip-rule="evenodd"/></svg>
          <span id="btn-download-label"></span>
        </button>
      </div>
    </header>

    <!-- About -->
    <section class="section" id="about">
      <h2 class="section-title collapsible-trigger" data-section="about">
        <span class="section-icon">▶</span>
        <span id="about-title"></span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.168l3.71-3.938a.75.75 0 1 1 1.08 1.04l-4.25 4.5a.75.75 0 0 1-1.08 0l-4.25-4.5a.75.75 0 0 1 .02-1.06z" clip-rule="evenodd"/></svg>
      </h2>
      <div class="section-body">
        <p class="about-text" id="about-text"></p>
      </div>
    </section>

    <!-- Experience -->
    <section class="section" id="experience">
      <h2 class="section-title collapsible-trigger" data-section="experience">
        <span class="section-icon">▶</span>
        <span id="experience-title"></span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.168l3.71-3.938a.75.75 0 1 1 1.08 1.04l-4.25 4.5a.75.75 0 0 1-1.08 0l-4.25-4.5a.75.75 0 0 1 .02-1.06z" clip-rule="evenodd"/></svg>
      </h2>
      <div class="section-body">
        <div class="timeline" id="timeline"></div>
      </div>
    </section>

    <!-- Education & Certifications -->
    <section class="section" id="education">
      <h2 class="section-title collapsible-trigger" data-section="education">
        <span class="section-icon">▶</span>
        <span id="education-title"></span>
        <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 11.168l3.71-3.938a.75.75 0 1 1 1.08 1.04l-4.25 4.5a.75.75 0 0 1-1.08 0l-4.25-4.5a.75.75 0 0 1 .02-1.06z" clip-rule="evenodd"/></svg>
      </h2>
      <div class="section-body">
        <div class="edu-grid" id="edu-grid"></div>
        <h3 class="cert-subtitle" id="cert-subtitle"></h3>
        <div class="cert-list" id="cert-list"></div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="main-footer">
      <p id="footer-text"></p>
    </footer>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.12/build/pdfmake.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfmake@0.2.12/build/vfs_fonts.js"></script>
  <script src="script.js"></script>
</body>
</html>
